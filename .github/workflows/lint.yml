name: Swift Lint

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: swift-lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swiftlint:
    runs-on: macos-15
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode (same toolchain as build/test)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.2"

      - name: Toolchain versions
        run: |
          xcodebuild -version
          swift --version

      - name: Install SwiftLint
        run: |
          if ! command -v swiftlint >/dev/null; then brew install swiftlint; fi
          swiftlint version

      - name: SwiftLint (strict, non-blocking)
        run: swiftlint lint --strict
        continue-on-error: true
